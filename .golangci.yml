# golangci-lint v2 configuration
# See: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  tests: true

output:
  formats:
    - format: text
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
    # Default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional linters
    - bodyclose
    - copyloopvar
    - durationcheck
    - errname
    - errorlint
    - goconst
    - gocritic
    - gosec
    - misspell
    - nakedret
    - nilerr
    - noctx
    - revive
    - unconvert
    - unparam
    - whitespace

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write

    goconst:
      min-len: 3
      min-occurrences: 5

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - whyNoLint
        - wrapperFunc
        - appendCombine
        - hugeParam
        - ifElseChain

    gosec:
      excludes:
        - G104 # Audit errors not checked (handled by errcheck)
        - G204 # Subprocess launched with variable (expected for CLI tools invoking claude/gh)
        - G304 # File path provided as taint input (acceptable for CLI)
        - G306 # SQLite file permissions
        - G404 # Weak random (fine for non-crypto use)

    govet:
      enable-all: true
      disable:
        - fieldalignment

    misspell:
      locale: US
      ignore-words:
        - cancelled
        - cancelling

    nakedret:
      max-func-lines: 30

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst
          - gosec
          - errcheck
          - gocritic

      - linters:
          - errcheck
        source: "defer"

    max-issues-per-linter: 50
    max-same-issues: 10

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
