# golangci-lint v2 configuration
# See: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  tests: true

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true

linters:
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional linters
    - bodyclose
    - copyloopvar
    - durationcheck
    - errname
    - errorlint
    - goconst
    - gocritic
    - gosec
    - misspell
    - nakedret
    - nilerr
    - revive
    - unconvert
    - unparam
    - whitespace

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (*github.com/hergen/toad/internal/slack.Client).ReplyInThread
        - (*github.com/hergen/toad/internal/slack.Client).React
        - (*github.com/hergen/toad/internal/slack.Client).RemoveReaction
        - (*github.com/hergen/toad/internal/slack.Client).SwapReaction
        - (*github.com/hergen/toad/internal/state.DB).ClearDaemonStats
        - (*github.com/hergen/toad/internal/state.DB).WriteDaemonStats
        - (*database/sql.DB).Close
        - (*database/sql.DB).Exec

    goconst:
      min-len: 3
      min-occurrences: 5

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - wrapperFunc
        - appendCombine
        - hugeParam
        - ifElseChain
        - rangeValCopy

    gosec:
      excludes:
        - G104 # Audit errors not checked (handled by errcheck)
        - G204 # Subprocess launched with variable (expected for CLI tools invoking claude/gh)
        - G304 # File path provided as taint input (acceptable for CLI)
        - G114 # net/http serve without timeouts (acceptable for local-only status server)
        - G117 # Struct field matches secret pattern (false positive on Slack token struct)
        - G301 # Directory permissions (0755 is fine for ~/.toad/)
        - G302 # File permissions (0644 is fine for log files)
        - G306 # SQLite file permissions
        - G404 # Weak random (fine for non-crypto use)
        - G704 # SSRF via taint (false positive on local status server)

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow # Too noisy in idiomatic Go err-handling patterns

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration

    staticcheck:
      checks:
        - "all"
        - "-QF*" # Disable quickfix suggestions (style, not correctness)

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst
          - gosec
          - errcheck
          - gocritic

      - linters:
          - errcheck
        source: "defer"

      - path: internal/log/
        linters:
          - revive # Package name "log" conflicts with stdlib — intentional

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
