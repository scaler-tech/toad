# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: toad

before:
  hooks:
    - go mod tidy

builds:
  - binary: toad
    main: .
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/scaler-tech/toad/cmd.Version={{.Version}}
      - -X github.com/scaler-tech/toad/cmd.Commit={{.Commit}}
      - -X github.com/scaler-tech/toad/cmd.BuildDate={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_v{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ title .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}64bit
      {{- else if eq .Arch "arm64" }}ARM64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "toad_v{{.Version}}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^Merge"

report_sizes: true

dockers_v2:
  - images:
      - "ghcr.io/scaler-tech/toad"
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile
    flags:
      - "--cache-from=type=gha"
      - "--cache-to=type=gha,mode=max"
    labels:
      "org.opencontainers.image.title": toad
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "https://github.com/scaler-tech/toad"

release:
  github:
    owner: scaler-tech
    name: toad
  mode: append
  footer: |
    # Install

    ## macOS and Linux
    ### Install with [`Homebrew`](https://brew.sh)
    ```console
    brew tap scaler-tech/pkg https://github.com/scaler-tech/pkg
    brew install --cask toad
    ```

    ## Windows
    ### Install with [`Scoop`](https://scoop.sh)
    ```console
    scoop bucket add scaler-tech https://github.com/scaler-tech/pkg
    scoop install toad
    ```

    ## Docker
    ```console
    docker pull ghcr.io/scaler-tech/toad:{{.Version}}
    ```

    ## Anywhere else
    Alternatively, you can install the latest binary from this page.

    ### Manual downloads
    Download for Windows [64bit](https://github.com/scaler-tech/toad/releases/download/v{{.Version}}/toad_v{{.Version}}_Windows_64bit.zip) / [ARM64](https://github.com/scaler-tech/toad/releases/download/v{{.Version}}/toad_v{{.Version}}_Windows_ARM64.zip)
    Download for Linux [64bit](https://github.com/scaler-tech/toad/releases/download/v{{.Version}}/toad_v{{.Version}}_Linux_64bit.tar.gz) / [ARM64](https://github.com/scaler-tech/toad/releases/download/v{{.Version}}/toad_v{{.Version}}_Linux_ARM64.tar.gz)
    Download for macOS [64bit](https://github.com/scaler-tech/toad/releases/download/v{{.Version}}/toad_v{{.Version}}_macOS_64bit.tar.gz) / [ARM64](https://github.com/scaler-tech/toad/releases/download/v{{.Version}}/toad_v{{.Version}}_macOS_ARM64.tar.gz)

    For more options, check the `Assets` section below.

scoops:
  -
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/scaler-tech/toad"
    description: "AI-powered code assistant that lives in Slack"
    license: MIT
    shortcuts: [["toad.exe", "toad"]]
    repository:
      owner: scaler-tech
      name: pkg
      token: "{{ .Env.GITHUB_TOKEN }}"

homebrew_casks:
  -
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/scaler-tech/toad"
    description: "AI-powered code assistant that lives in Slack"
    caveats: "run 'toad --help' to get started"
    url:
      template: "https://github.com/scaler-tech/toad/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    repository:
      owner: scaler-tech
      name: pkg
      token: "{{ .Env.GITHUB_TOKEN }}"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/toad"]
          end
