<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>toad kiosk</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --dim: #7d8590;
    --muted: #484f58;
    --green: #4CAF50;
    --red: #FF5252;
    --amber: #FFC107;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto auto 1fr;
  }

  /* ── Header ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
  }
  .top-left { display: flex; align-items: center; gap: 20px; }
  .top-bar h1 { font-size: 22px; font-weight: 600; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 500;
    padding: 6px 16px; border-radius: 16px;
  }
  .status-pill.online { background: rgba(76,175,80,0.12); color: var(--green); }
  .status-pill.offline { background: rgba(255,82,82,0.12); color: var(--red); }
  .status-pill .dot {
    width: 8px; height: 8px; border-radius: 50%; background: currentColor;
  }
  .status-pill.online .dot { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .clock {
    font-size: 22px; font-weight: 300; color: var(--dim);
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
  }
  .dash-link {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
  }
  .dash-link:hover { border-color: var(--blue); color: var(--text); }
  .dash-link svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Stat tiles row ── */
  .tiles {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .tile {
    background: var(--bg);
    padding: 12px 16px;
    text-align: center;
  }
  .tile-val {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .tile-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--dim);
    margin-top: 4px;
  }
  .tile-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .c-green { color: var(--green); }
  .c-red { color: var(--red); }
  .c-amber { color: var(--amber); }
  .c-blue { color: var(--blue); }
  .c-dim { color: var(--dim); }

  /* ── Main content ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 0;
    overflow: hidden;
  }

  /* ── Personality radar ── */
  .personality-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Panels */
  .panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .panel:last-child { border-right: none; }
  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px 10px;
    flex-shrink: 0;
  }
  .panel-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--green);
  }
  .panel-count {
    font-size: 11px;
    color: var(--dim);
  }
  .panel-body {
    flex: 1;
    overflow: hidden;
    padding: 0 28px 16px;
  }

  /* ── Active run cards ── */
  .active-card {
    background: var(--surface);
    border: 1px solid rgba(88,166,255,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
  }
  .active-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--blue);
  }
  .ac-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .ac-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--blue);
  }
  .ac-timer {
    font-size: 20px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .ac-task {
    font-size: 14px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ac-branch {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── History cards ── */
  .hist-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .hist-card:last-child { border-bottom: none; }
  .hist-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700;
    flex-shrink: 0;
  }
  .hist-icon.done { background: rgba(76,175,80,0.15); color: var(--green); }
  .hist-icon.failed { background: rgba(255,82,82,0.15); color: var(--red); }
  .hist-info { flex: 1; min-width: 0; }
  .hist-task {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hist-meta {
    font-size: 12px; color: var(--dim); margin-top: 2px;
    display: flex; gap: 12px;
  }
  .hist-meta a { color: var(--blue); text-decoration: none; }

  /* ── Opportunity cards ── */
  .opp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 8px;
  }
  .opp-card.dismissed { opacity: 0.45; }
  .opp-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .opp-cat {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .opp-cat.bug { color: var(--red); }
  .opp-cat.feature { color: var(--purple); }
  .opp-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
  }
  .opp-badge.dry-run { background: rgba(255,193,7,0.12); color: var(--amber); }
  .opp-badge.commented { background: rgba(88,166,255,0.12); color: var(--blue); }
  .opp-badge.spawned { background: rgba(76,175,80,0.12); color: var(--green); }
  .opp-badge.dismissed { background: rgba(125,133,144,0.1); color: var(--dim); }
  .opp-badge.investigating { background: rgba(88,166,255,0.12); color: var(--blue); }
  .opp-summary {
    font-size: 14px;
    font-weight: 500;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .opp-bottom {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--dim);
  }
  .opp-conf-bar {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .opp-conf-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--green);
  }

  /* ── Watch cards ── */
  .watch-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .watch-card:last-child { border-bottom: none; }
  .watch-num {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 16px;
    font-weight: 600;
    flex-shrink: 0;
    width: 50px;
  }
  .watch-info { flex: 1; min-width: 0; }
  .watch-branch {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .watch-progress {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .watch-pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border);
  }
  .watch-pip.filled { background: var(--green); }

  /* ── Section dividers ── */
  .section-sep {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    padding: 12px 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  /* ── Utilities ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .empty-msg {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 32px 0;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <h1><img src="/logo.png" alt="toad" style="height:28px;vertical-align:middle;margin-right:8px">toad</h1>
    <span class="status-pill offline" id="status-pill">
      <span class="dot"></span> <span id="status-text">Offline</span>
    </span>
  </div>
  <div class="top-right" style="display:flex;align-items:center;gap:12px">
    <a class="dash-link" href="/" title="Dashboard">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </a>
    <span class="clock" id="clock"></span>
  </div>
</div>

<div class="main">
  <div class="panel">
    <div class="personality-tile" id="personality-tile" style="display:none">
      <canvas id="personality-radar" width="280" height="280"></canvas>
    </div>
    <div class="panel-head">
      <span class="panel-title" id="left-title">Active</span>
      <span class="panel-count" id="left-count"></span>
    </div>
    <div class="panel-body" id="left-body"></div>
  </div>
  <div class="panel">
    <div class="tiles" id="tiles"></div>
    <div class="panel-head">
      <span class="panel-title" id="right-title">Opportunities</span>
      <span class="panel-count" id="right-count"></span>
    </div>
    <div class="panel-body" id="right-body"></div>
  </div>
</div>

<script>
function fmtDuration(seconds) {
  if (!seconds) return '-';
  const s = Math.round(seconds);
  if (s >= 3600) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    return h + 'h ' + String(m).padStart(2,'0') + 'm';
  }
  const m = Math.floor(s / 60);
  const sec = s % 60;
  if (m > 0) return m + 'm ' + String(sec).padStart(2,'0') + 's';
  return sec + 's';
}
function fmtUptime(seconds) {
  if (!seconds) return '-';
  const s = Math.round(seconds);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (d > 0) return d + 'd ' + h + 'h';
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}
function esc(s) {
  if (!s) return '';
  const el = document.createElement('div');
  el.textContent = s;
  return el.innerHTML;
}
function abbrevSize(s) {
  const m = {tiny: 'xs', small: 's', medium: 'm', large: 'l', xlarge: 'xl', 'extra-large': 'xl'};
  return m[s] || esc(s);
}
function relTimeAgo(unixTs, now) {
  const diff = now - unixTs;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

// Clock
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}
updateClock();
setInterval(updateClock, 1000);

// Auto-update tracking
let updatePhase = ''; // '', 'waiting', 'reloading'
let updateOrigPID = 0;
let updateOrigStartedAt = 0;

async function refresh() {
  try {
    const resp = await fetch('/api/data');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const d = await resp.json();
    const now = d.now;
    const dm = d.daemon || {};
    const st = d.stats || {};
    const ms = d.merge_stats || {};
    const dc = d.digest_counts || {};
    const prNoun = d.pr_noun || 'PR';

    // ── Status pill ──
    const pill = document.getElementById('status-pill');
    const stxt = document.getElementById('status-text');
    if (dm.running) {
      pill.className = 'status-pill online';
      stxt.textContent = 'Online \u2014 ' + fmtUptime(dm.uptime_s) + ' \u00b7 v' + (dm.daemon_version || dm.version);
    } else {
      pill.className = 'status-pill offline';
      stxt.textContent = 'Offline';
    }

    // ── Auto-update: detect restart and reload kiosk ──
    if (d.auto_restarting && updatePhase === '') {
      updateOrigPID = d.auto_restart_pid || dm.pid || 0;
      updateOrigStartedAt = d.auto_restart_started || dm.started_at || 0;
      updatePhase = 'waiting';
      pill.className = 'status-pill online';
      stxt.textContent = 'Updating\u2026';
    }
    if (updatePhase === 'waiting' && dm.running && !dm.draining && updateOrigPID) {
      const restarted = dm.pid !== updateOrigPID || (dm.started_at && dm.started_at !== updateOrigStartedAt);
      if (restarted) {
        updatePhase = 'reloading';
        pill.className = 'status-pill online';
        stxt.textContent = 'Reloading\u2026';
        try { await fetch('/api/reload-dashboard'); } catch {}
        const poll = setInterval(() => {
          fetch('/api/data').then(() => { clearInterval(poll); window.location.reload(); }).catch(() => {});
        }, 1000);
        return;
      }
    }

    // ── Stat tiles ──
    const tiles = [];
    // Runs
    const runSub = st.Failed ? st.Failed + ' failed' : 'all passed';
    const runCls = st.Failed ? 'c-amber' : 'c-green';
    tiles.push({val: st.TotalRuns || 0, label: 'Runs', sub: runSub, cls: runCls});
    // Merge rate
    if (ms.merge_rate >= 0) {
      const mCls = ms.merge_rate >= 70 ? 'c-green' : ms.merge_rate >= 40 ? 'c-amber' : 'c-red';
      const mSub = ms.prs_merged + ' merged, ' + ms.prs_open + ' open';
      tiles.push({val: ms.merge_rate.toFixed(0) + '%', label: 'Merge Rate', sub: mSub, cls: mCls});
    }
    // Avg duration
    if (st.AvgDuration) {
      tiles.push({val: fmtDuration(st.AvgDuration / 1e9), label: 'Avg Duration', cls: ''});
    }
    // Digest
    if (dm.digest_enabled) {
      const mode = dm.digest_dry_run ? (dm.digest_comment_mode ? 'comment' : 'dry-run') : 'live';
      tiles.push({val: dm.digest_opportunities || 0, label: 'Opportunities', sub: dm.digest_processed + ' processed (' + mode + ')', cls: dm.digest_opportunities > 0 ? 'c-amber' : 'c-dim'});
    }
    // Watches
    const watches = d.watches || [];
    if (watches.length > 0) {
      tiles.push({val: watches.length, label: prNoun + ' Watches', cls: 'c-blue'});
    }
    // Ribbits
    tiles.push({val: dm.ribbits || 0, label: 'Ribbits', sub: (st.ThreadCount || 0) + ' threads', cls: dm.ribbits > 0 ? 'c-green' : 'c-dim'});

    let thtml = '';
    for (const t of tiles) {
      thtml += '<div class="tile"><div class="tile-val ' + (t.cls || '') + '">' + t.val + '</div>'
        + '<div class="tile-label">' + t.label + '</div>'
        + (t.sub ? '<div class="tile-sub">' + t.sub + '</div>' : '')
        + '</div>';
    }
    document.getElementById('tiles').innerHTML = thtml;

    // ── Left panel: Active + History ──
    const active = d.active || [];
    const history = d.history || [];
    const lbody = document.getElementById('left-body');
    const ltitle = document.getElementById('left-title');
    const lcount = document.getElementById('left-count');

    let lhtml = '';

    // Active runs
    if (active.length > 0) {
      ltitle.textContent = 'Active';
      lcount.textContent = active.length + ' running';
      for (const r of active) {
        const elapsed = now - r.started_at;
        lhtml += '<div class="active-card">'
          + '<div class="ac-top">'
          + '<span class="ac-status"><span class="spinner"></span> ' + r.status + '</span>'
          + '<span class="ac-timer">' + fmtDuration(elapsed) + '</span>'
          + '</div>'
          + '<div class="ac-task">' + esc(r.task) + '</div>'
          + '<div class="ac-branch">' + esc(r.branch) + '</div>'
          + '</div>';
      }
    }

    // History
    if (history.length > 0) {
      if (active.length > 0) {
        lhtml += '<div class="section-sep">Recent</div>';
      } else {
        ltitle.textContent = 'Recent';
        lcount.textContent = history.length + ' runs';
      }
      for (const r of history) {
        const icon = r.status === 'done' ? '\u2713' : '\u2717';
        const cls = r.status === 'done' ? 'done' : 'failed';
        let pr = '';
        if (r.pr_url) {
          try {
            const u = new URL(r.pr_url);
            if (u.protocol === 'https:' || u.protocol === 'http:') {
              const num = u.pathname.split('/').pop();
              pr = '<a href="' + esc(r.pr_url) + '" target="_blank">#' + num + '</a>';
            }
          } catch {}
        }
        const meta = [relTimeAgo(r.started_at, now), fmtDuration(r.duration_s)];
        if (r.files_changed) meta.push(r.files_changed + ' files');
        if (pr) meta.push(pr);
        if (r.error && r.status === 'failed') meta.push('<span style="color:var(--red)">' + esc(r.error.substring(0, 60)) + '</span>');

        lhtml += '<div class="hist-card">'
          + '<div class="hist-icon ' + cls + '">' + icon + '</div>'
          + '<div class="hist-info">'
          + '<div class="hist-task">' + esc(r.task) + '</div>'
          + '<div class="hist-meta">' + meta.join(' \u00b7 ') + '</div>'
          + '</div></div>';
      }
    }

    if (!lhtml) lhtml = '<div class="empty-msg">No runs yet</div>';
    lbody.innerHTML = lhtml;

    // ── Right panel: Opportunities + Watches ──
    const opps = d.opportunities || [];
    const rbody = document.getElementById('right-body');
    const rtitle = document.getElementById('right-title');
    const rcount = document.getElementById('right-count');
    let rhtml = '';

    // Opportunities
    if (opps.length > 0) {
      rtitle.textContent = 'Opportunities';
      const nonDismissed = opps.filter(o => !o.dismissed).length;
      rcount.textContent = nonDismissed + ' active';

      for (const o of opps) {
        let badge;
        if (o.investigating) badge = '<span class="opp-badge investigating"><span class="spinner"></span> investigating</span>';
        else if (o.dismissed) badge = '<span class="opp-badge dismissed">dismissed</span>';
        else if (o.dry_run && dm.digest_comment_mode) badge = '<span class="opp-badge commented">commented</span>';
        else if (o.dry_run) badge = '<span class="opp-badge dry-run">dry-run</span>';
        else badge = '<span class="opp-badge spawned">spawned</span>';

        const catCls = o.category === 'bug' ? 'bug' : o.category === 'feature' ? 'feature' : '';
        const conf = (o.confidence * 100).toFixed(0);
        const confColor = o.confidence >= 0.9 ? 'var(--green)' : o.confidence >= 0.7 ? 'var(--amber)' : 'var(--red)';

        rhtml += '<div class="opp-card' + (o.dismissed ? ' dismissed' : '') + '">'
          + '<div class="opp-top">'
          + '<span class="opp-cat ' + catCls + '">' + esc(o.category) + ' \u00b7 ' + abbrevSize(o.est_size) + '</span>'
          + badge
          + '</div>'
          + '<div class="opp-summary">' + esc(o.summary) + '</div>'
          + '<div class="opp-bottom">'
          + '<div class="opp-conf-bar"><div class="opp-conf-fill" style="width:' + conf + '%;background:' + confColor + '"></div></div>'
          + '<span>' + conf + '% confidence</span>'
          + (o.channel ? '<span class="opp-badge" style="background:rgba(125,133,144,0.1);color:var(--dim)">#' + esc(o.channel) + '</span>' : '')
          + '<span>' + relTimeAgo(o.created_at, now) + '</span>'
          + '</div></div>';
      }
    }

    // Watches
    if (watches.length > 0) {
      if (opps.length > 0) {
        rhtml += '<div class="section-sep">' + prNoun + ' Watches</div>';
      } else {
        rtitle.textContent = prNoun + ' Watches';
        rcount.textContent = watches.length + ' watching';
      }
      for (const w of watches) {
        let pips = '';
        const max = 3;
        for (let i = 0; i < max; i++) {
          pips += '<span class="watch-pip' + (i < w.fix_count ? ' filled' : '') + '"></span>';
        }
        rhtml += '<div class="watch-card">'
          + '<span class="watch-num">#' + w.pr_number + '</span>'
          + '<div class="watch-info"><div class="watch-branch">' + esc(w.branch) + '</div></div>'
          + '<span class="watch-progress">' + pips + '</span>'
          + '</div>';
      }
    }

    if (!rhtml) {
      rhtml = '<div class="empty-msg">No opportunities or watches</div>';
      rtitle.textContent = 'Opportunities';
      rcount.textContent = '';
    }
    rbody.innerHTML = rhtml;

  } catch (e) {
    document.getElementById('status-pill').className = 'status-pill offline';
    document.getElementById('status-text').textContent = 'Connection lost';
  }
}

refresh();
setInterval(refresh, 3000);

// ── Personality radar ──
let pChart = null;
const traitLabels = [
  'thoroughness','context_hunger','confidence_threshold','pattern_recognition',
  'risk_tolerance','scope_appetite','test_affinity','creativity','retry_persistence',
  'strictness','pattern_conformity','documentation_drive','speed_vs_polish',
  'verbosity','explanation_depth','notification_eagerness','defensiveness','tone',
  'autonomy','collaboration','initiative','scope_sensitivity'
];
const shortLabels = [
  'Thorough','Context','Confidence','Patterns',
  'Risk','Scope','Tests','Creative','Retry',
  'Strict','Conform','Docs','Polish',
  'Verbose','Explain','Notify','Defend','Tone',
  'Autonomy','Collab','Initiative','Scope Sens'
];

async function loadPersonality() {
  try {
    const resp = await fetch('/api/personality');
    if (!resp.ok) return;
    const d = await resp.json();
    const eff = d.effective;
    if (!eff) return;

    document.getElementById('personality-tile').style.display = '';
    const base = d.base;
    const values = traitLabels.map(k => eff[k] || 0);
    const baseValues = base ? traitLabels.map(k => base[k] || 0) : values;

    if (pChart) {
      pChart.data.datasets[0].data = values;
      pChart.data.datasets[1].data = baseValues;
      pChart.update('none');
      return;
    }

    const ctx = document.getElementById('personality-radar').getContext('2d');
    pChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: shortLabels,
        datasets: [{
          data: values,
          backgroundColor: 'rgba(88,166,255,0.15)',
          borderColor: 'rgba(88,166,255,0.7)',
          borderWidth: 1.5,
          pointRadius: 1,
          pointBackgroundColor: 'rgba(88,166,255,0.9)',
        }, {
          data: baseValues,
          backgroundColor: 'rgba(163,113,247,0.08)',
          borderColor: 'rgba(163,113,247,0.4)',
          borderWidth: 1,
          pointRadius: 0,
          borderDash: [3, 3],
        }]
      },
      options: {
        responsive: false,
        plugins: { legend: { display: false } },
        scales: {
          r: {
            min: 0, max: 1,
            ticks: { display: false, stepSize: 0.25 },
            grid: { color: 'rgba(48,54,61,0.5)' },
            angleLines: { color: 'rgba(48,54,61,0.3)' },
            pointLabels: {
              color: '#7d8590',
              font: { size: 8 }
            }
          }
        }
      }
    });
  } catch {}
}

loadPersonality();
setInterval(loadPersonality, 30000);
</script>
